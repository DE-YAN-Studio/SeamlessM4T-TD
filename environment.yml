name: seamless-td
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - torch --index-url https://download.pytorch.org/whl/cu124
    - fastapi
    - uvicorn[standard]
    - python-multipart
    - transformers
    - scipy
    - soundfile
    - numpy
    - sentencepiece
    - tiktoken
    - protobuf
